<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predict - Asthma AI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        :root {
            --primary-color: #00d2ff;
            --secondary-color: #3a7bd5;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --danger-color: #ff4b4b;
            --success-color: #00e676;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://images.unsplash.com/photo-1505751172876-fa1923c5c528') no-repeat center center/cover;
            min-height: 100vh;
            color: white;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
            text-transform: uppercase;
        }

        .nav-links a {
            text-decoration: none;
            color: white;
            margin-left: 30px;
            transition: 0.3s;
            position: relative;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--primary-color);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background-color: var(--primary-color);
            transition: width 0.3s;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 100px 20px 40px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            animation: fadeIn 0.8s ease-out;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.8rem;
            border-bottom: 2px solid var(--primary-color);
            display: inline-block;
            padding-bottom: 5px;
            position: relative;
            left: 50%;
            transform: translateX(-50%);
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--primary-color);
        }

        .input-group input, 
        .input-group select {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        .input-group select {
            cursor: pointer;
        }

        .input-group select option {
            background: #333;
            color: white;
        }

        .input-group input:focus, 
        .input-group select:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
        }

        .slider-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .slider-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .slider-header label {
            font-weight: 500;
            color: var(--primary-color);
        }

        .slider-value {
            background: rgba(0, 210, 255, 0.2);
            padding: 2px 10px;
            border-radius: 10px;
            font-weight: bold;
        }

        .slider {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.2);
            outline: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--primary-color);
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.8);
            transition: transform 0.2s;
        }

        .slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .slider-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 5px;
        }

        .btn-primary {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            background: linear-gradient(45deg, var(--secondary-color), var(--primary-color));
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            margin-top: 10px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 210, 255, 0.5);
        }

        #result {
            margin-top: 30px;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            display: none;
            animation: fadeIn 0.5s;
        }

        .risk-high {
            background: rgba(255, 75, 75, 0.2);
            border: 1px solid var(--danger-color);
        }

        .risk-low {
            background: rgba(0, 230, 118, 0.2);
            border: 1px solid var(--success-color);
        }

        .risk-label {
            font-size: 1.5rem;
            font-weight: bold;
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            nav { padding: 15px 20px; flex-direction: column; gap: 10px; }
            .glass-card { padding: 25px; }
        }
    </style>
</head>
<body>

    <!-- Navigation -->
    <nav>
        <div class="logo"><i class="fas fa-lungs"></i> AsthmaAI</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="predict.html" class="active">Predict</a>
            <a href="analytics.html">Analytics</a>
        </div>
    </nav>

    <div class="container">
        <div class="glass-card">
            <h2><i class="fas fa-heartbeat"></i> Risk Assessment</h2>
            
            <form id="predictionForm" onsubmit="event.preventDefault(); predictRisk();">
                
                <!-- Age Input -->
                <div class="input-group">
                    <label><i class="fas fa-user"></i> Age</label>
                    <input type="number" id="age" placeholder="Enter your age" required min="1" max="120">
                </div>

                <!-- Smoking Dropdown -->
                <div class="input-group">
                    <label><i class="fas fa-smoking"></i> Do you smoke?</label>
                    <select id="smoking" required>
                        <option value="" disabled selected>Select Option</option>
                        <option value="0">No, I don't smoke</option>
                        <option value="1">Yes, I smoke</option>
                    </select>
                </div>

                <!-- Pollution Slider -->
                <div class="slider-group">
                    <div class="slider-header">
                        <label><i class="fas fa-industry"></i> Pollution Exposure</label>
                        <span id="pollution-val" class="slider-value">50</span>
                    </div>
                    <input type="range" id="pollution" min="0" max="100" value="50" class="slider" oninput="updateSlider('pollution')">
                    <div class="slider-labels">
                        <span>Low</span><span>High</span>
                    </div>
                </div>

                <!-- Pollen Slider -->
                <div class="slider-group">
                    <div class="slider-header">
                        <label><i class="fas fa-pollen"></i> Pollen Level</label>
                        <span id="pollen-val" class="slider-value">50</span>
                    </div>
                    <input type="range" id="pollen" min="0" max="100" value="50" class="slider" oninput="updateSlider('pollen')">
                    <div class="slider-labels">
                        <span>Low</span><span>High</span>
                    </div>
                </div>

                <!-- PM2.5 Slider -->
                <div class="slider-group">
                    <div class="slider-header">
                        <label><i class="fas fa-wind"></i> PM2.5 Level</label>
                        <span id="pm25-val" class="slider-value">50</span>
                    </div>
                    <input type="range" id="pm25" min="0" max="500" value="50" class="slider" oninput="updateSlider('pm25')">
                    <div class="slider-labels">
                        <span>Clean</span><span>Hazardous</span>
                    </div>
                </div>

                <!-- Temperature Slider -->
                <div class="slider-group">
                    <div class="slider-header">
                        <label><i class="fas fa-thermometer-half"></i> Temperature (°C)</label>
                        <span id="temp-val" class="slider-value">25</span>
                    </div>
                    <input type="range" id="temp" min="-10" max="50" value="25" class="slider" oninput="updateSlider('temp')">
                    <div class="slider-labels">
                        <span>Cold</span><span>Hot</span>
                    </div>
                </div>

                <button type="submit" class="btn-primary"><i class="fas fa-robot"></i> Analyze Risk</button>
            </form>

            <!-- Result Display -->
            <div id="result"></div>
        </div>
    </div>

    <script>
        function updateSlider(id) {
            const value = document.getElementById(id).value;
            document.getElementById(id + '-val').innerText = value;
        }

        async function predictRisk() {
            const age = parseInt(document.getElementById("age").value);
            const smoking = parseInt(document.getElementById("smoking").value);
            const pollution = parseFloat(document.getElementById("pollution").value);
            const pollen = parseFloat(document.getElementById("pollen").value);
            const pm25 = parseFloat(document.getElementById("pm25").value);
            const temp = parseFloat(document.getElementById("temp").value);

            if (isNaN(age) || isNaN(smoking) || isNaN(pollution) || 
                isNaN(pollen) || isNaN(pm25) || isNaN(temp)) {
                alert("Please fill in all fields!");
                return;
            }

            const btn = document.querySelector(".btn-primary");
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Analyzing...';
            btn.disabled = true;

            const data = {
                "Age": age,
                "Smoking": smoking,
                "PollutionExposure": pollution,
                "PollenExposure": pollen,
                "PM2.5": pm25,
                "Temp_C": temp
            };

            try {
                const response = await fetch("http://127.0.0.1:8000/predict", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                const resultDiv = document.getElementById("result");
                
                resultDiv.style.display = "block";
                resultDiv.className = "";

                if (result.prediction === 1) {
                    resultDiv.classList.add("risk-high");
                    resultDiv.innerHTML = `
                        <i class="fas fa-exclamation-triangle" style="font-size: 2rem; margin-bottom: 10px;"></i><br>
                        <span class="risk-label">High Asthma Risk</span>
                        <span style="font-size: 0.9rem; opacity: 0.8;">Redirecting to recommendations...</span>
                    `;
                    localStorage.setItem("asthmaRisk", "high");
                    setTimeout(() => { window.location.href = "analytics.html"; }, 10000);
                } else {
                    resultDiv.classList.add("risk-low");
                    resultDiv.innerHTML = `
                        <i class="fas fa-check-circle" style="font-size: 2rem; margin-bottom: 10px;"></i><br>
                        <span class="risk-label">Low Asthma Risk</span>
                        <span style="font-size: 0.9rem; opacity: 0.8;">Redirecting to recommendations...</span>
                    `;
                    localStorage.setItem("asthmaRisk", "low");
                    setTimeout(() => { window.location.href = "analytics.html"; }, 10000);
                }

            } catch (error) {
                console.error("Error:", error);
                alert("Could not connect to server!");
            } finally {
                btn.innerHTML = '<i class="fas fa-robot"></i> Analyze Risk';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
